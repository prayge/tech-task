bundle:
  name: colibri

include:
  - resources/*.yml

artifacts:
  colibri_wheel:
    type: whl
    path: .
    build: python -m build --wheel

resources:
  jobs:
    job_colibri_daily:
      name: job_colibri_daily
      schedule:
        quartz_cron_expression: "0 15 10 ? * *"   # 10:15 UTC daily
        timezone_id: UTC
        pause_status: PAUSED
      tasks:
        - task_key: run_colibri_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_colibri_pipeline.id}
            full_refresh: false

    job_colibri_test_suite:
      name: job_colibri_test_suite_${bundle.target}
      max_concurrent_runs: 1
      queue:
        enabled: true
      tasks:
        - task_key: run_tests
          spark_python_task:
            python_file: tests/run_tests.py
            source: WORKSPACE
          environment_key: test_env
      environments:
        - environment_key: test_env
          spec:
            environment_version: "3"
            dependencies:
              - pytest>=8.0
              - dist/*.whl

  pipelines:
    pipeline_colibri_pipeline:
      name: pipeline_colibri_pipeline_${bundle.target}
      catalog: colibri
      schema: ${bundle.target}
      serverless: true
      libraries:
        - glob:
            include: transformations/**

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-552b3fd9-703f.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-552b3fd9-703f.cloud.databricks.com
